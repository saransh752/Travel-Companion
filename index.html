<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Explorer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="overlay"></div>

    <div class="app">
        <div class="top-row">
            <h1>Travel Explorer</h1>
            <button id="themeToggle" class="theme-btn">🌙 Dark</button>
        </div>
        <p class="subtitle">Search a city and explore weather, country, currency and top places.</p>

        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Try Paris, Tokyo, India..." />
            <button id="searchBtn">Search</button>
        </div>

        <div id="recentSearches" class="recent-searches"></div>
        <div id="loadingText" class="loading hide">
            <div class="spinner"></div>
            <div>Loading travel data...</div>
        </div>
        <p id="errorText" class="error hide"></p>

        <div id="results" class="results hide">
            <div class="card fade-in" id="weatherCard"></div>
            <div class="card fade-in" id="countryCard"></div>
            <div class="card fade-in" id="currencyCard"></div>
            <div class="card fade-in places-card" id="placesCard"></div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Explorer - Smart Travel Companion</title>
    <meta name="description" content="Explore any destination worldwide. Get live weather, country info, currency rates, and top travel insights instantly.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="intro-mode">
    <div class="mainbox">
        <div class="header-container" id="headerContainer">
            <header class="headpart">
                <div class="head-titles">
                    <span class="intro-badge">✈ Smart Travel Companion</span>
                    <h1>Where do you want<br>to explore?</h1>
                    <p>Live weather, country info, currency rates &amp; top attractions — all in one place.</p>
                </div>
                <button id="themeBtn" class="theme-btn" aria-label="Toggle dark mode">
                    <svg class="theme-icon" viewBox="0 0 24 24"><path fill="currentColor" d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></svg>
                </button>
            </header>

            <div class="searcharea">
                <div class="searchdiv">
                    <svg class="search-icon" viewBox="0 0 24 24"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                    <input type="text" id="cityinput" placeholder="Try Paris, Tokyo, New York..." autocomplete="off">
                    <button id="btn" class="primary-btn">Explore</button>
                </div>
                <div id="errorMsg" class="err hide">Please enter a valid destination.</div>
                <div class="intro-suggestions">
                    <button class="sugg-chip" data-city="Paris">🗼 Paris</button>
                    <button class="sugg-chip" data-city="Tokyo">🗾 Tokyo</button>
                    <button class="sugg-chip" data-city="New York">🗽 New York</button>
                    <button class="sugg-chip" data-city="Dubai">🏙 Dubai</button>
                    <button class="sugg-chip" data-city="London">🎡 London</button>
                </div>
            </div>
        </div>

        <div id="loading" class="waitloader hide">
            <div class="loader-spinner"></div>
            <p>Gathering travel insights...</p>
        </div>

        <main id="resultsbox" class="resultsbox hide">
            <!-- Cards injected by JS -->
        </main>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>

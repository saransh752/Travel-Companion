<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place Details - Travel Explorer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="overlay"></div>
    <div class="app detail-wrap">
        <div id="detailRoot" class="detail-card"></div>
    </div>

    <script>
        const PLACE_DETAIL_KEY = "travel_explorer_selected_place";
        const DEFAULT_PLACE_IMAGE = "https://picsum.photos/seed/travel-default/900/500";
        const root = document.getElementById("detailRoot");
        const raw = localStorage.getItem(PLACE_DETAIL_KEY);

        if (!raw) {
            root.innerHTML = `
                <div class="detail-content">
                    <h2>No place selected</h2>
                    <p>Please go back and click Read More on a place card.</p>
                    <div class="detail-links">
                        <a class="detail-link" href="index.html">Back to Home</a>
                    </div>
                </div>
            `;
        } else {
            const place = JSON.parse(raw);
            const wikiUrl = place.wikipediaUrl || `https://en.wikipedia.org/wiki/${encodeURIComponent(place.title)}`;
            const mapUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(place.title + " " + (place.address || ""))}`;

            root.innerHTML = `
                <img class="detail-image" src="${place.image || DEFAULT_PLACE_IMAGE}" alt="${place.title}" onerror="this.onerror=null;this.src='${DEFAULT_PLACE_IMAGE}'">
                <div class="detail-content">
                    <h2>${place.title}</h2>
                    <p><strong>Category:</strong> ${place.category || "travel"}</p>
                    <p><strong>Address:</strong> ${place.address || "Address not available"}</p>
                    ${place.distance ? `<p><strong>Distance:</strong> ${(place.distance / 1000).toFixed(1)} km</p>` : ""}
                    ${place.popularity ? `<p><strong>Popularity:</strong> ${place.popularity.toFixed(2)}</p>` : ""}
                    <p>${place.description || "No description available."}</p>
                    <div class="detail-links">
                        <a class="detail-link" href="${wikiUrl}" target="_blank" rel="noopener noreferrer">Wikipedia</a>
                        <a class="detail-link" href="${mapUrl}" target="_blank" rel="noopener noreferrer">Open in Maps</a>
                        <a class="detail-link" href="index.html">Back to Home</a>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
